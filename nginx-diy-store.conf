# /etc/nginx/sites-available/diy-store
# Add this as a NEW file — do NOT touch your existing rimaierp config

server {
    listen 80;
    server_name diystore.yourdomain.com;   # <-- change to your actual domain/subdomain

    # Redirect to HTTPS after you run certbot
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name diystore.yourdomain.com;   # <-- same as above

    ssl_certificate /etc/letsencrypt/live/diystore.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diystore.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (match your RIMai config)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Next.js on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    client_max_body_size 10M;
}
